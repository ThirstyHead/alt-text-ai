<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* SMACSS - BASE STYLES 
           Core defaults and CSS variables 
        */
        :root {
            --bg-main: #0f172a;      /* Slate 900 */
            --bg-card: #1e293b;      /* Slate 800 */
            --text-main: #f8fafc;    /* Slate 50 */
            --text-muted: #94a3b8;   /* Slate 400 */
            --accent: #3b82f6;       /* Blue 500 */
            --accent-focus: #60a5fa; /* Blue 400 */
            --transition-speed: 0.3s;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            line-height: 1.5;
            overflow: hidden; /* Prevent body scroll, use main content scroll */
        }

        /* Focus indicators for WCAG 2.1 AA compliance */
        :focus-visible {
            outline: 3px solid var(--accent-focus);
            outline-offset: 4px;
        }

        /* SMACSS - LAYOUT STYLES 
           The skeleton of the application 
        */
        .l-app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .l-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid #334155;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .l-main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .l-sidebar {
            width: 16rem; /* 64 in tailwind */
            background-color: var(--bg-card);
            border-right: 1px solid #334155;
            overflow-y: auto;
            transition: transform var(--transition-speed) ease;
        }

        .l-content {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            overflow-y: auto;
            outline: none;
        }

        .l-notes {
            width: 20rem; /* 80 in tailwind */
            background-color: #020617; /* Slate 950 */
            border-left: 1px solid #334155;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* SMACSS - MODULE STYLES 
           Reusable components 
        */
        .m-slide {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100%;
            padding: 2rem;
            animation: slideIn 0.4s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .m-slide-card {
            max-width: 64rem; /* 4xl */
            width: 100%;
            background-color: var(--bg-card);
            padding: 3rem;
            border-radius: 1.5rem;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Hero Slide Module (Image Background) */
        .m-slide--hero {
            padding: 0; 
            position: relative;
            background-size: contain; 
            background-position: left center; 
            background-repeat: no-repeat;
            background-color: #000; 
        }

        .m-slide-overlay {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 45%;
            background-color: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(8px);
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* NEW MODULE: visual-demo
           Used for full-screen content recreations to ensure text-in-image is accessible
        */
        .m-visual-demo {
            background-color: #fff;
            color: #000;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 4rem;
        }

        .m-visual-box {
            border: 2px solid #e2e8f0;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            font-family: serif;
            font-size: 1.5rem;
            text-align: center;
        }

        .m-nav-btn {
            width: 100%;
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            border-left: 4px solid transparent;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .m-nav-btn:hover {
            background-color: #334155;
        }

        .m-skip-link {
            position: absolute;
            top: -100px;
            left: 0.5rem;
            background: var(--accent);
            color: white;
            padding: 0.75rem 1.5rem;
            z-index: 100;
            border-radius: 0 0 0.5rem 0.5rem;
        }

        .m-skip-link:focus {
            top: 0;
        }

        .m-controls {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            z-index: 40;
        }

        /* SMACSS - STATE STYLES */
        .is-active {
            display: flex !important;
        }

        .m-nav-btn.is-selected {
            background-color: rgba(59, 130, 246, 0.1);
            border-left-color: var(--accent);
            color: white;
            font-weight: 600;
        }

        .is-hidden {
            display: none !important;
        }

        /* Print styles */
        @media print {
            .no-print { display: none !important; }
            .l-sidebar, .l-notes, .m-controls { display: none !important; }
            .m-slide { display: block !important; page-break-after: always; }
        }

        /* Responsive adjustments */
        @media (max-width: 1024px) {
            .m-slide-overlay {
                width: 55%;
                padding: 2rem;
            }
        }

        @media (max-width: 768px) {
            .m-slide--hero {
                background-position: center top;
            }
            .m-slide-overlay {
                position: relative;
                width: 100%;
                background-color: rgba(15, 23, 42, 0.9);
                padding: 2rem;
            }
            .m-visual-demo {
                padding: 1rem;
            }
        }
    </style>
</head>

                    const pointsHtml = (data.points || []).map(p => `
                        <li class="flex items-start gap-4 mb-4">
                            <span aria-hidden="true" class="w-2 h-2 rounded-full bg-blue-500 mt-2.5 flex-shrink-0"></span>
                            <span>${p}</span>
                        </li>
                    `).join('');
                    
                    slide.innerHTML = `
                        <div class="m-slide-card">
                            <h2 id="header-${index}" class="text-4xl md:text-5xl font-black mb-8 leading-tight outline-none" tabindex="-1">
                                ${data.title}
                            </h2>
                            ${data.subtitle ? `<p class="text-2xl text-blue-400 mb-8 font-medium italic">${data.subtitle}</p>` : ''}
                            ${data.content ? `<div class="text-2xl md:text-3xl text-slate-300 font-medium leading-relaxed mt-12">${data.content}</div>` : ''}
                            ${data.points && data.points.length > 0 ? `
                                <ul class="text-xl md:text-2xl text-slate-300 leading-relaxed list-none p-0 mt-8">
                                    ${pointsHtml}
                                </ul>` : ''}
                        </div>
                    `;
                }
                slidesWrapper.appendChild(slide);

                const listItem = document.createElement('li');
                listItem.role = "none";
                listItem.innerHTML = `
                    <button id="nav-btn-${index}" class="m-nav-btn ${index === 0 ? 'is-selected' : ''}" role="menuitem">
                        <span class="opacity-50 inline-block w-6">${index + 1}.</span>
                        <span class="truncate inline-block w-44 align-bottom">${data.title}</span>
                    </button>
                `;
                listItem.querySelector('button').onclick = () => goToSlide(index);
                slideList.appendChild(listItem);
            });

            updateSlideUI();
        }

        /**
         * NAVIGATION LOGIC
         */
        function goToSlide(index) {
            if (index < 0 || index >= slideData.length) return;
            
            document.querySelectorAll('.m-slide').forEach(s => s.classList.remove('is-active'));
            document.querySelectorAll('.m-nav-btn').forEach(b => b.classList.remove('is-selected'));

            currentIndex = index;
            const activeSlide = document.getElementById(`slide-${currentIndex}`);
            activeSlide.classList.add('is-active');
            
            const activeNav = document.getElementById(`nav-btn-${currentIndex}`);
            activeNav.classList.add('is-selected');
            activeNav.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            updateSlideUI();
            announcer.textContent = `Slide ${currentIndex + 1} of ${slideData.length}: ${slideData[currentIndex].title}`;
            
            const header = activeSlide.querySelector('h2');
            header.focus();
        }

        /**
         * UI REFRESH
         */
        function updateSlideUI() {
            notesContent.innerHTML = slideData[currentIndex].notes || "No notes.";
            currentNumDisplay.textContent = currentIndex + 1;
            
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === slideData.length - 1;
        }

        /**
         * TOGGLE FEATURES
         */
        function toggleSidebar() {
            sideNav.classList.toggle('is-hidden');
            announcer.textContent = sideNav.classList.contains('is-hidden') ? "Slide list hidden" : "Slide list visible";
        }

        function toggleNotes() {
            speakerNotes.classList.toggle('is-hidden');
            announcer.textContent = speakerNotes.classList.contains('is-hidden') ? "Speaker notes hidden" : "Speaker notes visible";
        }

        /**
         * KEYBOARD EVENTS
         */
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                goToSlide(currentIndex + 1);
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                goToSlide(currentIndex - 1);
            }

            if (key === 'l') toggleSidebar();
            if (key === 'n') toggleNotes();
            if (key === 'p') {
                const isHidden = sideNav.classList.contains('is-hidden') && speakerNotes.classList.contains('is-hidden');
                if (isHidden) {
                    sideNav.classList.remove('is-hidden');
                    speakerNotes.classList.remove('is-hidden');
                } else {
                    sideNav.classList.add('is-hidden');
                    speakerNotes.classList.add('is-hidden');
                }
                announcer.textContent = isHidden ? "Standard view" : "Presenter mode active";
            }
        });

        document.getElementById('prev-btn').onclick = () => goToSlide(currentIndex - 1);
        document.getElementById('next-btn').onclick = () => goToSlide(currentIndex + 1);

        window.onload = init;
    </script>
</body>
</html>
