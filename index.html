        */
        :root {

        * {

        }

            height: 100vh;

        h1, h2, p, ul {

        }

            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
            color: inherit;
        }

        /* Focus indicators for WCAG 2.1 AA */
        :focus-visible {
            outline: 3px solid var(--accent-focus);
            outline-offset: 4px;
        }

        /* SMACSS - LAYOUT STYLES 
           The major structural landmarks of the page.
        */
        .l-app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            flex-shrink: 0;
        }

        .l-main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .l-sidebar {

            border-right: 1px solid var(--border-color);

            flex-shrink: 0;
        }

        .l-content {

            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            outline: none;
        }

        .l-notes {
            width: 22rem;
            background-color: var(--bg-notes);
            border-left: 1px solid var(--border-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* SMACSS - MODULE STYLES 
           Reusable components.
        */
        
        /* Nav Buttons */
        .m-nav-btn {
            width: 100%;
            text-align: left;
            padding: 0.85rem 1rem;
            font-size: 0.875rem;
            border-left: 4px solid transparent;
            color: var(--text-muted);
            transition: background var(--transition-speed);
            display: flex;
            gap: 0.5rem;
        }

        .m-nav-btn:hover {
            background-color: var(--border-color);
            color: var(--text-main);
        }

        .m-nav-btn-num {
            opacity: 0.5;
            width: 1.5rem;
            flex-shrink: 0;
        }

        .m-nav-btn-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Skip Link */
        .m-skip-link {
            position: absolute;
            top: -100px;
            left: 1rem;
            background: var(--accent);
            color: white;
            padding: 1rem 2rem;
            z-index: 100;
            border-radius: 0 0 0.5rem 0.5rem;
            text-decoration: none;
            font-weight: bold;
        }

        .m-skip-link:focus {
            top: 0;
        }

        /* Slides */
        .m-slide {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            padding: 3rem;
            overflow-y: auto;
            animation: slideIn 0.4s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Card Content */
        .m-slide-card {
            max-width: 60rem;
            width: 100%;
            background-color: var(--bg-card);
            padding: 4rem;
            border-radius: 2rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
        }

        .m-slide-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 2rem;
            line-height: 1.1;
        }

        .m-slide-subtitle {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 2.5rem;
            font-weight: 500;
            font-style: italic;
        }

        .m-slide-list {
            list-style: none;
            padding: 0;
            font-size: 1.5rem;
            color: #cbd5e1; /* Slate 300 */
        }

        .m-slide-list-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .m-slide-bullet {
            width: 0.6rem;
            height: 0.6rem;
            background-color: var(--accent);
            border-radius: 50%;
            margin-top: 0.6rem;
            flex-shrink: 0;
        }

        /* Hero Slide (Title Metaphor) */
        .m-slide--hero {
            padding: 0;
            background-size: contain;
            background-position: left center;
            background-repeat: no-repeat;
            background-color: #000;
            position: relative;
            overflow: hidden;
        }

        .m-slide-overlay {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 45%;
            background-color: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(12px);
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Full Image Slide */
        .m-slide--full {
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }

        .m-full-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            color: white;
            text-align: center;
            font-style: italic;
        }

        /* Controls */
        .m-controls {
            position: absolute;
            bottom: 3rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 2rem;
            z-index: 40;
        }

        .m-btn-circle {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            transition: all 0.2s;
        }

        .m-btn-circle:hover:not(:disabled) {
            background-color: var(--border-color);
            transform: scale(1.05);
        }

        .m-btn-circle:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .m-btn-primary {
            background-color: var(--accent);
            border-color: var(--accent-focus);
        }

        .m-btn-primary:hover:not(:disabled) {
            background-color: var(--accent-focus);
        }

        /* Icons */
        .m-icon {
            width: 1.5rem;
            height: 1.5rem;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
        }

        /* SMACSS - STATE STYLES 
           Classes modified via JavaScript.
        */
        .is-hidden {
            display: none !important;
        }

        .is-active {
            display: flex !important;
        }

        .is-selected {
            background-color: rgba(59, 130, 246, 0.15) !important;
            border-left-color: var(--accent) !important;
            color: white !important;
            font-weight: bold;
        }

        /* Accessibility Utilities */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Print styles */
        @media print {
            .no-print { display: none !important; }
            .l-sidebar, .l-notes, .m-controls { display: none !important; }
            .m-slide { display: flex !important; page-break-after: always; height: auto; }
        }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            .m-slide-overlay { width: 55%; padding: 2rem; }
            .m-slide-title { font-size: 2.25rem; }
        }

        @media (max-width: 768px) {
            .l-sidebar, .l-notes { width: 100%; position: absolute; height: 100%; z-index: 100; }
            .m-slide-overlay { position: relative; width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border-color); }
            .m-slide--hero { background-position: center top; flex-direction: column; justify-content: flex-start; }
            .m-slide-card { padding: 2rem; }
        }
    </style>
</head>

                    `;
                } 
                else if (data.image) {
                    slide.className = `m-slide m-slide--hero ${index === 0 ? 'is-active' : ''}`;
                    slide.style.backgroundImage = `url('${data.image}')`;
                    slide.setAttribute('role', 'img');
                    slide.setAttribute('aria-label', data.imageAlt || '');
                    
                    slide.innerHTML = `
                        <div class="m-slide-overlay">
                            <h2 id="header-${index}" class="m-slide-title" tabindex="-1">
                                ${data.title}
                            </h2>
                            ${data.subtitle ? `<p class="m-slide-subtitle">${data.subtitle}</p>` : ''}
                            ${data.content ? `<div style="font-size: 1.5rem; color: var(--text-muted);">${data.content}</div>` : ''}
                        </div>
                    `;
                } else {
                    slide.className = `m-slide ${index === 0 ? 'is-active' : ''}`;
                    slide.setAttribute('aria-labelledby', `header-${index}`);
                    
                    const pointsHtml = (data.points || []).map(p => `
                        <li class="m-slide-list-item">
                            <span aria-hidden="true" class="m-slide-bullet"></span>
                            <span>${p}</span>
                        </li>
                    `).join('');
                    
                    slide.innerHTML = `
                        <div class="m-slide-card">
                            <h2 id="header-${index}" class="m-slide-title" tabindex="-1">
                                ${data.title}
                            </h2>
                            ${data.subtitle ? `<p class="m-slide-subtitle">${data.subtitle}</p>` : ''}
                            ${data.content ? `<div style="font-size: 1.5rem; margin-bottom: 2rem;">${data.content}</div>` : ''}
                            ${data.points && data.points.length > 0 ? `
                                <ul class="m-slide-list">
                                    ${pointsHtml}
                                </ul>` : ''}
                        </div>
                    `;
                }
                slidesWrapper.appendChild(slide);

                const listItem = document.createElement('li');
                listItem.role = "none";
                listItem.innerHTML = `
                    <button id="nav-btn-${index}" class="m-nav-btn ${index === 0 ? 'is-selected' : ''}" role="menuitem">
                        <span class="m-nav-btn-num">${index + 1}.</span>
                        <span class="m-nav-btn-text">${data.title}</span>
                    </button>
                `;
                listItem.querySelector('button').onclick = () => goToSlide(index);
                slideList.appendChild(listItem);
            });

            updateSlideUI();
        }

        function goToSlide(index) {
            if (index < 0 || index >= slideData.length) return;
            
            document.querySelectorAll('.m-slide').forEach(s => s.classList.remove('is-active'));
            document.querySelectorAll('.m-nav-btn').forEach(b => b.classList.remove('is-selected'));

            currentIndex = index;
            const activeSlide = document.getElementById(`slide-${currentIndex}`);
            activeSlide.classList.add('is-active');
            
            const activeNav = document.getElementById(`nav-btn-${currentIndex}`);
            activeNav.classList.add('is-selected');
            activeNav.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            updateSlideUI();
            
            announcer.textContent = `Slide ${currentIndex + 1} of ${slideData.length}: ${slideData[currentIndex].title}`;
            
            const header = activeSlide.querySelector('h2');
            if (header) header.focus();
        }

        function updateSlideUI() {
            notesContent.innerHTML = slideData[currentIndex].notes || "No notes.";
            currentNumDisplay.textContent = currentIndex + 1;
            
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === slideData.length - 1;
        }

        function toggleSidebar() {
            sideNav.classList.toggle('is-hidden');
            announcer.textContent = sideNav.classList.contains('is-hidden') ? "Sidebar hidden" : "Sidebar visible";
        }

        function toggleNotes() {
            speakerNotes.classList.toggle('is-hidden');
            announcer.textContent = speakerNotes.classList.contains('is-hidden') ? "Notes hidden" : "Notes visible";
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                goToSlide(currentIndex + 1);
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                goToSlide(currentIndex - 1);
            }

            if (key === 'l') toggleSidebar();
            if (key === 'n') toggleNotes();
            if (key === 'p') {
                const currentlyHidden = sideNav.classList.contains('is-hidden') && speakerNotes.classList.contains('is-hidden');
                if (currentlyHidden) {
                    sideNav.classList.remove('is-hidden');
                    speakerNotes.classList.remove('is-hidden');
                } else {
                    sideNav.classList.add('is-hidden');
                    speakerNotes.classList.add('is-hidden');
                }
                announcer.textContent = currentlyHidden ? "Standard mode" : "Presenter mode";
            }
        });

        document.getElementById('prev-btn').onclick = () => goToSlide(currentIndex - 1);
        document.getElementById('next-btn').onclick = () => goToSlide(currentIndex + 1);

        window.onload = init;
    </script>
</body>
</html>
